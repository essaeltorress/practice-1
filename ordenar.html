<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordenar - Pollos Hermanos</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <header>
      <h1>Realiza tu Pedido</h1>
    </header>
    <nav>
      <menu>
        <li><a href="index.html">Inicio</a></li>
      </menu>
    </nav>
    <main>
      <section>
        <h2>Selecciona tu Combo</h2>
        <form>
          <label for="paquete">Elige un paquete:</label>
          <select id="paquete" name="paquete">
            <option value="6">6 piece Meal</option>
            <option value="8">8 piece Meal</option>
            <option value="12">12 piece Meal</option>
            <option value="16">16 piece Meal</option>
          </select>
          <br><br>
          <label for="notas">Instrucciones especiales:</label><br>
          <textarea id="notas" name="notas" rows="4" cols="30"></textarea>
          <br><br>
          <button type="submit">Enviar Pedido</button>
        </form>
      </section>
    </main>
    <footer>Essael Torres Ortiz Aguirre</footer>
  </body>
</html>
